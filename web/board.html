<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hacker Wheel of Fortune</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0a0f0a; color: #e5e5e5;
  min-height: 100vh; overflow: hidden;
  display: flex; flex-direction: column;
}

/* Header */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.75rem 2rem;
  background: linear-gradient(180deg, #0d1a0d 0%, #0a0f0a 100%);
  border-bottom: 2px solid #22c55e;
}
.title {
  font-size: 1.8rem; font-weight: 800;
  color: #22c55e; text-transform: uppercase;
  letter-spacing: 0.1em;
  text-shadow: 0 0 20px rgba(34, 197, 94, 0.5);
}
.title span { color: #4ade80; }
.round-info {
  font-size: 1rem; color: #86efac;
  text-align: right;
}
.round-info .label { color: #666; font-size: 0.8rem; }

/* Main layout */
.main {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 1rem 2rem; gap: 1.5rem;
}

/* Category */
.category {
  font-size: 1.6rem; color: #fbbf24; font-weight: 600;
  text-align: center; text-transform: uppercase;
  letter-spacing: 0.05em;
  text-shadow: 0 0 10px rgba(251, 191, 36, 0.3);
}

/* Puzzle board */
.puzzle-board {
  display: flex; flex-wrap: wrap; gap: 6px;
  justify-content: center; max-width: 1100px;
  padding: 1.5rem; background: rgba(0, 0, 0, 0.4);
  border-radius: 12px; border: 2px solid #1a3a1a;
}
.puzzle-row {
  display: flex; gap: 6px; justify-content: center;
}
.tile {
  width: 56px; height: 68px;
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem; font-weight: 800; font-family: monospace;
  border-radius: 6px; transition: all 0.4s ease;
  flex-shrink: 0;
}
.tile.blank {
  background: linear-gradient(135deg, #0d2e0d, #1a4a1a);
  border: 2px solid #22c55e;
  box-shadow: inset 0 0 15px rgba(34, 197, 94, 0.15);
}
.tile.revealed {
  background: linear-gradient(135deg, #fff, #e8e8e8);
  color: #111; border: 2px solid #fff;
  box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
  animation: tileFlip 0.5s ease;
}
.tile.space { border: none; background: none; width: 24px; }

@keyframes tileFlip {
  0% { transform: rotateY(90deg); opacity: 0; }
  100% { transform: rotateY(0deg); opacity: 1; }
}

/* Scoreboard */
.scoreboard {
  display: flex; gap: 2rem; justify-content: center;
  width: 100%; max-width: 900px;
}
.score-card {
  flex: 1; max-width: 280px;
  background: linear-gradient(180deg, #111 0%, #0a0a0a 100%);
  border: 1px solid #222; border-radius: 8px;
  padding: 0.75rem 1rem; text-align: center;
  transition: all 0.3s ease;
}
.score-card.active {
  border-color: #22c55e;
  box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
}
.score-card .name {
  font-size: 1rem; font-weight: 700; color: #e5e5e5;
  margin-bottom: 0.25rem;
}
.score-card .round-amount {
  font-size: 1.8rem; font-weight: 800;
  font-family: monospace; color: #4ade80;
}
.score-card .bank-amount {
  font-size: 0.85rem; color: #86efac;
  font-family: monospace;
}
.score-card .skeleton-key {
  color: #fbbf24; font-size: 0.8rem;
}

/* Wheel display */
.wheel-container {
  position: relative; width: 300px; height: 300px;
  margin: 0 auto;
}
.wheel-canvas {
  width: 100%; height: 100%;
  border-radius: 50%;
  border: 4px solid #22c55e;
  box-shadow: 0 0 30px rgba(34, 197, 94, 0.3);
}
.wheel-pointer {
  position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 14px solid transparent;
  border-right: 14px solid transparent;
  border-top: 24px solid #ef4444;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
  z-index: 2;
}
.wheel-result {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 2rem; font-weight: 800; text-align: center;
  text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  z-index: 3; pointer-events: none;
}
.wheel-result.cash { color: #4ade80; }
.wheel-result.bankrupt { color: #ef4444; }
.wheel-result.special { color: #93c5fd; }

/* Letter tracker */
.letter-tracker {
  display: flex; flex-wrap: wrap; gap: 4px;
  justify-content: center; max-width: 600px;
}
.letter-track {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; font-weight: 700; font-family: monospace;
  border-radius: 4px;
}
.letter-track.available { background: #1a1a1a; color: #666; border: 1px solid #333; }
.letter-track.used { background: #333; color: #888; text-decoration: line-through; opacity: 0.4; }
.letter-track.consonant.available { border-color: #1d4ed8; }
.letter-track.vowel.available { border-color: #b45309; }

/* Spin overlay */
.spin-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0, 0, 0, 0.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
}
.spin-overlay .result-text {
  font-size: 4rem; font-weight: 900;
  animation: spinPulse 0.5s ease infinite alternate;
}
@keyframes spinPulse {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}

/* Event banner */
.event-banner {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 3rem; font-weight: 900; text-align: center;
  padding: 1.5rem 3rem; border-radius: 16px;
  z-index: 200; pointer-events: none;
  animation: bannerPop 2s ease forwards;
}
@keyframes bannerPop {
  0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
  15% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
  85% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
}
.event-banner.bankrupt {
  background: linear-gradient(135deg, #7f1d1d, #991b1b);
  color: #fca5a5; border: 3px solid #ef4444;
  text-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
}
.event-banner.solved {
  background: linear-gradient(135deg, #14532d, #166534);
  color: #86efac; border: 3px solid #22c55e;
}
.event-banner.bonus {
  background: linear-gradient(135deg, #713f12, #92400e);
  color: #fde68a; border: 3px solid #f59e0b;
}

/* Bonus timer */
.bonus-timer-display {
  font-size: 5rem; font-weight: 900; color: #ef4444;
  text-align: center;
  text-shadow: 0 0 30px rgba(239, 68, 68, 0.5);
}
.bonus-timer-display.urgent {
  animation: timerPulse 0.5s ease infinite alternate;
}
@keyframes timerPulse {
  from { transform: scale(1); color: #ef4444; }
  to { transform: scale(1.15); color: #ff0000; }
}

/* Toss-up prize */
.tossup-prize {
  font-size: 2rem; font-weight: 800; color: #fbbf24;
  text-align: center;
}

/* Lobby */
.lobby-screen {
  text-align: center;
}
.lobby-screen h2 {
  font-size: 3rem; color: #22c55e;
  text-shadow: 0 0 30px rgba(34, 197, 94, 0.5);
  margin-bottom: 1rem;
}
.lobby-players {
  display: flex; gap: 1.5rem; justify-content: center; margin-top: 1.5rem;
}
.lobby-player {
  padding: 1rem 2rem; background: #111; border: 1px solid #333;
  border-radius: 8px; font-size: 1.3rem; font-weight: 700;
}

/* Final scores */
.final-scores {
  text-align: center;
}
.final-scores h2 {
  font-size: 2.5rem; color: #fbbf24; margin-bottom: 1.5rem;
}
.final-score-card {
  display: inline-block; padding: 1.5rem 3rem;
  background: #111; border: 2px solid #333; border-radius: 12px;
  margin: 0 1rem; text-align: center;
}
.final-score-card.winner {
  border-color: #22c55e;
  box-shadow: 0 0 30px rgba(34, 197, 94, 0.3);
}
.final-score-card .name { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.5rem; }
.final-score-card .total {
  font-size: 2.5rem; font-weight: 900; font-family: monospace; color: #4ade80;
}
</style>
</head>
<body>

<div class="header">
  <div class="title">Hacker <span>Wheel of Fortune</span></div>
  <div class="round-info">
    <div id="round-label" class="label">LOBBY</div>
    <div id="round-number"></div>
  </div>
</div>

<div class="main" id="main-area">
  <!-- Content rendered dynamically -->
</div>

<script>
const WS_URL = `ws://${location.host}`;
let ws = null;
let state = null;
let spinAngle = 0;
let spinAnimFrame = null;

function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => ws.send(JSON.stringify({ type: 'join', role: 'board' }));
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'game-state') {
      state = msg.state;
      render();
    } else if (msg.type === 'event') {
      handleEvent(msg);
    }
  };
  ws.onclose = () => setTimeout(connect, 2000);
}

function handleEvent(msg) {
  switch (msg.event) {
    case 'bankrupt':
      showBanner('PWNED!', 'bankrupt');
      break;
    case 'puzzle_solved':
      showBanner('SOLVED!', 'solved');
      break;
    case 'bonus_won':
      showBanner('$' + msg.prize.toLocaleString() + '!', 'bonus');
      break;
    case 'mystery_win':
      showBanner('$10,000!', 'bonus');
      break;
  }
}

function showBanner(text, cls) {
  const el = document.createElement('div');
  el.className = `event-banner ${cls}`;
  el.textContent = text;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

function render() {
  if (!state) return;
  const main = document.getElementById('main-area');
  const roundLabel = document.getElementById('round-label');
  const roundNum = document.getElementById('round-number');

  switch (state.phase) {
    case 'lobby':
      roundLabel.textContent = 'LOBBY';
      roundNum.textContent = '';
      main.innerHTML = renderLobby();
      break;

    case 'toss_up':
    case 'toss_up_solve':
      roundLabel.textContent = 'TOSS-UP';
      roundNum.textContent = '#' + state.tossUpNumber;
      main.innerHTML = renderTossUp();
      break;

    case 'awaiting_action':
    case 'awaiting_letter':
    case 'awaiting_vowel':
    case 'mystery_choice':
    case 'round_won':
      roundLabel.textContent = state.speedRound ? 'SPEED ROUND' : (state.isPrizePuzzle ? 'PRIZE PUZZLE' : 'ROUND');
      roundNum.textContent = state.speedRound ? '' : ('#' + state.roundNumber);
      main.innerHTML = renderMainRound();
      break;

    case 'pre_bonus':
      roundLabel.textContent = 'BONUS';
      roundNum.textContent = '';
      main.innerHTML = '<div style="text-align:center;"><h2 style="font-size:2.5rem;color:#fbbf24;">Bonus Round Coming Up...</h2></div>';
      break;

    case 'bonus_pick':
    case 'bonus_reveal':
    case 'bonus_solve':
    case 'bonus_result':
      roundLabel.textContent = 'BONUS ROUND';
      roundNum.textContent = '';
      main.innerHTML = renderBonusRound();
      break;

    case 'final_score':
      roundLabel.textContent = 'FINAL';
      roundNum.textContent = '';
      main.innerHTML = renderFinalScores();
      break;
  }
}

function renderLobby() {
  const players = state.players.map(p =>
    `<div class="lobby-player">${p.name}</div>`
  ).join('');
  return `
    <div class="lobby-screen">
      <h2>HACKER WHEEL OF FORTUNE</h2>
      <p style="color:#86efac; font-size:1.2rem;">Waiting for players...</p>
      <div class="lobby-players">${players}</div>
    </div>
  `;
}

function renderTossUp() {
  const display = state.tossUp.display || [];
  const tiles = renderTiles(display);

  let buzzInfo = '';
  if (state.tossUp.buzzedPlayer) {
    const p = state.players.find(pl => pl.id === state.tossUp.buzzedPlayer);
    buzzInfo = `<div style="font-size:1.5rem; color:#22c55e; font-weight:700; margin-top:1rem;">${p ? p.name : '???'} BUZZED IN!</div>`;
  }

  return `
    <div class="category">${state.tossUp.category || ''}</div>
    <div class="tossup-prize">$${state.tossUp.prize.toLocaleString()}</div>
    <div class="puzzle-board">${tiles}</div>
    ${buzzInfo}
    ${renderScoreboard()}
  `;
}

function renderMainRound() {
  const display = state.puzzle ? state.puzzle.display : [];
  const tiles = renderTiles(display);

  // Spin result
  let spinDisplay = '';
  if (state.spinAnimating) {
    spinDisplay = '<div style="font-size:1.5rem;color:#4ade80;text-align:center;animation:spinPulse 0.3s infinite alternate;">SPINNING...</div>';
  } else if (state.lastSpin) {
    const w = state.lastSpin.wedge;
    if (w.type === 'cash') {
      spinDisplay = `<div style="font-size:1.3rem;color:#4ade80;text-align:center;font-weight:700;">$${w.value}</div>`;
    } else if (w.type === 'bankrupt') {
      spinDisplay = `<div style="font-size:1.3rem;color:#ef4444;text-align:center;font-weight:700;">${w.label}</div>`;
    } else {
      spinDisplay = `<div style="font-size:1.3rem;color:#93c5fd;text-align:center;font-weight:700;">${w.label}</div>`;
    }
  }

  // Speed round indicator
  let speedInfo = '';
  if (state.speedRound) {
    const urgent = state.speedTurnTimer <= 2;
    speedInfo = `<div style="text-align:center;color:#f59e0b;font-weight:700;font-size:1.1rem;">SPEED ROUND — $${state.speedValue}/consonant</div>
    <div style="text-align:center;font-size:3rem;font-weight:900;color:${urgent ? '#ef4444' : '#fbbf24'};${urgent ? 'animation:timerPulse 0.5s ease infinite alternate;' : ''}">${state.speedTurnTimer}</div>`;
  }

  return `
    ${speedInfo}
    <div class="category">${state.puzzle ? state.puzzle.category : ''}</div>
    <div class="puzzle-board">${tiles}</div>
    ${spinDisplay}
    ${renderLetterTracker()}
    ${renderScoreboard()}
  `;
}

function renderBonusRound() {
  const display = state.bonus.display || [];
  const tiles = renderTiles(display);

  const player = state.players[state.bonus.player];
  let timerDisplay = '';
  if (state.phase === 'bonus_solve') {
    const urgent = state.bonus.timeRemaining <= 3;
    timerDisplay = `<div class="bonus-timer-display${urgent ? ' urgent' : ''}">${state.bonus.timeRemaining}</div>`;
  }

  let resultDisplay = '';
  if (state.phase === 'bonus_result') {
    if (state.bonus.solved) {
      resultDisplay = `<div style="text-align:center;font-size:2rem;color:#4ade80;font-weight:800;">
        ${player.name} WINS $${state.bonus.prize.toLocaleString()}!</div>`;
    } else {
      resultDisplay = `<div style="text-align:center;font-size:1.5rem;color:#ef4444;font-weight:700;">Time's Up!</div>`;
    }
  }

  return `
    <div style="text-align:center;color:#fbbf24;font-size:1.2rem;font-weight:600;">
      ${player ? player.name : ''} — Playing for $${state.bonus.prize.toLocaleString()}
      ${state.bonus.hasSkeletonKey ? ' 🔑' : ''}
    </div>
    <div class="category">${state.bonus.category || ''}</div>
    <div class="puzzle-board">${tiles}</div>
    ${timerDisplay}
    ${resultDisplay}
    ${renderScoreboard()}
  `;
}

function renderFinalScores() {
  const sorted = [...state.players].sort((a, b) => b.bank - a.bank);
  const maxBank = sorted.length > 0 ? sorted[0].bank : 0;
  const cards = sorted.map(p =>
    `<div class="final-score-card${p.bank === maxBank ? ' winner' : ''}">
      <div class="name">${p.name}</div>
      <div class="total">$${p.bank.toLocaleString()}</div>
    </div>`
  ).join('');

  return `
    <div class="final-scores">
      <h2>FINAL SCORES</h2>
      ${cards}
    </div>
  `;
}

function renderScoreboard() {
  return `<div class="scoreboard">${state.players.map((p, i) =>
    `<div class="score-card${i === state.currentPlayer ? ' active' : ''}">
      <div class="name">${p.name}${p.hasSkeletonKey ? ' 🔑' : ''}</div>
      <div class="round-amount">$${p.roundEarnings.toLocaleString()}</div>
      <div class="bank-amount">Bank: $${p.bank.toLocaleString()}</div>
    </div>`
  ).join('')}</div>`;
}

function renderTiles(display) {
  // Split into words (groups separated by spaces), then wrap into rows of max 14 tiles
  const MAX_TILES_PER_ROW = 14;
  const words = [];
  let currentWord = [];
  for (const t of display) {
    if (t.space) {
      if (currentWord.length > 0) words.push(currentWord);
      currentWord = [];
    } else {
      currentWord.push(t);
    }
  }
  if (currentWord.length > 0) words.push(currentWord);

  // Pack words into rows
  const rows = [];
  let row = [];
  let rowLen = 0;
  for (const word of words) {
    const needed = rowLen > 0 ? word.length + 1 : word.length; // +1 for space
    if (rowLen > 0 && rowLen + needed > MAX_TILES_PER_ROW) {
      rows.push(row);
      row = [];
      rowLen = 0;
    }
    if (rowLen > 0) {
      row.push({ space: true });
      rowLen += 1;
    }
    row.push(...word);
    rowLen += word.length;
  }
  if (row.length > 0) rows.push(row);

  return rows.map(r =>
    '<div class="puzzle-row">' + r.map(t => {
      if (t.space) return '<div class="tile space"></div>';
      return `<div class="tile ${t.revealed ? 'revealed' : 'blank'}">${t.revealed ? t.char : ''}</div>`;
    }).join('') + '</div>'
  ).join('');
}

function renderLetterTracker() {
  const called = state.calledLetters || [];
  const all = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  const vowels = 'AEIOU';
  return `<div class="letter-tracker">${all.split('').map(c => {
    const used = called.includes(c);
    const isVowel = vowels.includes(c);
    return `<div class="letter-track ${isVowel ? 'vowel' : 'consonant'} ${used ? 'used' : 'available'}">${c}</div>`;
  }).join('')}</div>`;
}

connect();
</script>
</body>
</html>
