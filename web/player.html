<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hacker WoF - Player</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #0a0a0a; color: #e5e5e5;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; padding: 1rem;
}

h1 { color: #22c55e; font-size: 1.4rem; margin-bottom: 1rem; text-align: center; }

.panel {
  background: #111; border: 1px solid #222; border-radius: 12px;
  padding: 1.25rem; width: 100%; max-width: 400px; margin-bottom: 1rem;
}

/* Join form */
.join-form { text-align: center; }
.join-form input {
  width: 100%; background: #1a1a1a; border: 1px solid #333;
  color: #e5e5e5; padding: 12px; border-radius: 8px;
  font-size: 1.1rem; margin-bottom: 0.75rem; text-align: center;
}
.btn {
  padding: 12px 24px; border: 1px solid #333; border-radius: 8px;
  background: #1a1a1a; color: #e5e5e5; cursor: pointer;
  font-size: 1rem; font-weight: 600; width: 100%;
}
.btn:hover { background: #333; }
.btn-primary { background: #166534; border-color: #22c55e; color: #22c55e; }
.btn-primary:hover { background: #22c55e; color: #000; }
.btn-danger { background: #7f1d1d; border-color: #ef4444; color: #fca5a5; }

/* Player info */
.player-info { text-align: center; }
.player-name { font-size: 1.3rem; font-weight: 700; color: #4ade80; }
.player-score {
  font-size: 2.5rem; font-weight: 900; font-family: monospace;
  color: #22c55e; margin: 0.5rem 0;
}
.player-bank {
  font-size: 1rem; color: #86efac; font-family: monospace;
}

/* Turn indicator */
.turn-indicator {
  text-align: center; padding: 1rem; border-radius: 8px;
  font-size: 1.2rem; font-weight: 700;
}
.turn-indicator.your-turn {
  background: #14532d; border: 2px solid #22c55e;
  color: #4ade80; animation: pulse 1.5s ease infinite;
}
.turn-indicator.waiting {
  background: #1a1a1a; border: 1px solid #333; color: #666;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
  50% { box-shadow: 0 0 20px 5px rgba(34, 197, 94, 0.2); }
}

/* Puzzle display (simplified) */
.puzzle-mini {
  display: flex; flex-wrap: wrap; gap: 3px;
  justify-content: center; margin: 0.5rem 0;
}
.mini-tile {
  width: 24px; height: 30px; display: flex;
  align-items: center; justify-content: center;
  font-size: 0.9rem; font-weight: 700; font-family: monospace;
  border-radius: 3px;
}
.mini-tile.blank { background: #1a3a1a; border: 1px solid #22c55e; }
.mini-tile.revealed { background: #fff; color: #000; border: 1px solid #fff; }
.mini-tile.space { width: 10px; border: none; }

/* Buzzer */
.buzzer-btn {
  width: 200px; height: 200px; border-radius: 50%;
  background: radial-gradient(circle at 40% 40%, #ef4444, #991b1b);
  border: 4px solid #fca5a5; color: #fff;
  font-size: 1.5rem; font-weight: 900; cursor: pointer;
  text-transform: uppercase; margin: 1rem auto; display: block;
  box-shadow: 0 8px 30px rgba(239, 68, 68, 0.3);
  transition: transform 0.1s;
}
.buzzer-btn:active { transform: scale(0.95); }
.buzzer-btn:disabled {
  background: radial-gradient(circle at 40% 40%, #555, #333);
  border-color: #666; cursor: not-allowed;
  box-shadow: none;
}

/* Category */
.category-label {
  color: #fbbf24; font-size: 1rem; font-weight: 600;
  text-align: center; text-transform: uppercase;
}

/* Status messages */
.status-msg {
  text-align: center; color: #888; font-size: 0.9rem;
  padding: 0.5rem;
}
</style>
</head>
<body>

<h1>Hacker Wheel of Fortune</h1>

<div id="content"></div>

<script>
const WS_URL = `ws://${location.host}`;
let ws = null;
let state = null;
let myPlayerId = null;
let myPlayerName = localStorage.getItem('wof-player-name') || null;
let joined = !!myPlayerName;

function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    if (joined && myPlayerName) {
      // Reconnect with stored name
      ws.send(JSON.stringify({ type: 'join', role: 'player', name: myPlayerName }));
    }
    renderContent();
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'game-state') {
      state = msg.state;
      renderContent();
    } else if (msg.type === 'join-response') {
      // Server assigned our player ID
      myPlayerId = msg.playerId;
      myPlayerName = msg.name;
      localStorage.setItem('wof-player-name', msg.name);
      renderContent();
    }
  };
  ws.onclose = () => setTimeout(connect, 2000);
}

function joinGame(name) {
  ws.send(JSON.stringify({ type: 'join', role: 'player', name }));
  myPlayerName = name;
  localStorage.setItem('wof-player-name', name);
  joined = true;
}

function buzz() {
  if (!state || !myPlayerId) return;
  ws.send(JSON.stringify({ type: 'toss-up-buzz', playerId: myPlayerId }));
}

function renderContent() {
  const el = document.getElementById('content');

  if (!ws || ws.readyState !== 1) {
    el.innerHTML = '<div class="panel"><div class="status-msg">Connecting...</div></div>';
    return;
  }

  if (!joined) {
    el.innerHTML = `
      <div class="panel join-form">
        <input type="text" id="name-input" placeholder="Your name" maxlength="30">
        <button class="btn btn-primary" onclick="doJoin()">Join Game</button>
      </div>
    `;
    const input = document.getElementById('name-input');
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') doJoin(); });
    input.focus();
    return;
  }

  if (!state) {
    el.innerHTML = '<div class="panel"><div class="status-msg">Waiting for game data...</div></div>';
    return;
  }

  const me = myPlayerId ? state.players.find(p => p.id === myPlayerId) : null;
  if (!me) {
    el.innerHTML = '<div class="panel"><div class="status-msg">Waiting to be added to the game...</div></div>';
    return;
  }

  const isMyTurn = state.currentPlayer === state.players.indexOf(me);

  let html = '';

  // Player info
  html += `
    <div class="panel player-info">
      <div class="player-name">${me.name}</div>
      <div class="player-score">$${me.roundEarnings.toLocaleString()}</div>
      <div class="player-bank">Bank: $${me.bank.toLocaleString()}</div>
    </div>
  `;

  // Phase-specific content
  switch (state.phase) {
    case 'lobby':
      html += '<div class="panel"><div class="status-msg">Waiting for game to start...</div></div>';
      break;

    case 'toss_up':
    case 'toss_up_solve':
      html += '<div class="panel">';
      if (state.tossUp.category) {
        html += `<div class="category-label">${state.tossUp.category}</div>`;
      }
      if (state.tossUp.display) {
        html += '<div class="puzzle-mini">' + state.tossUp.display.map(t => {
          if (t.space) return '<div class="mini-tile space"></div>';
          return `<div class="mini-tile ${t.revealed ? 'revealed' : 'blank'}">${t.revealed ? t.char : ''}</div>`;
        }).join('') + '</div>';
      }
      html += `<div class="tossup-prize" style="text-align:center;color:#fbbf24;font-size:1.3rem;font-weight:700;margin:0.5rem 0;">$${state.tossUp.prize.toLocaleString()}</div>`;
      if (state.tossUp.buzzerOpen) {
        html += `<button class="buzzer-btn" onclick="buzz()">BUZZ!</button>`;
      } else if (state.tossUp.buzzedPlayer === myPlayerId) {
        html += '<div class="status-msg" style="color:#4ade80;font-weight:700;">You buzzed in! Answer now!</div>';
      } else {
        html += '<div class="status-msg">Buzzer locked</div>';
      }
      html += '</div>';
      break;

    case 'awaiting_action':
    case 'awaiting_letter':
    case 'awaiting_vowel':
    case 'mystery_choice':
      html += `
        <div class="panel">
          <div class="turn-indicator ${isMyTurn ? 'your-turn' : 'waiting'}">
            ${isMyTurn ? 'YOUR TURN!' : state.players[state.currentPlayer]?.name + "'s turn"}
          </div>
        </div>
      `;
      if (state.puzzle) {
        html += `<div class="panel">
          <div class="category-label">${state.puzzle.category}</div>
          <div class="puzzle-mini">${state.puzzle.display.map(t => {
            if (t.space) return '<div class="mini-tile space"></div>';
            return `<div class="mini-tile ${t.revealed ? 'revealed' : 'blank'}">${t.revealed ? t.char : ''}</div>`;
          }).join('')}</div>
        </div>`;
      }
      break;

    case 'round_won':
      html += '<div class="panel"><div class="status-msg" style="color:#4ade80;font-size:1.2rem;font-weight:700;">Puzzle Solved!</div></div>';
      break;

    case 'bonus_pick':
    case 'bonus_reveal':
    case 'bonus_solve':
      const isBonusPlayer = state.bonus.player === state.players.indexOf(me);
      html += `<div class="panel">
        <div class="status-msg" style="color:#fbbf24;font-weight:700;">
          ${isBonusPlayer ? 'YOUR BONUS ROUND!' : state.players[state.bonus.player]?.name + "'s Bonus Round"}
        </div>
        ${state.bonus.display ? '<div class="puzzle-mini">' + state.bonus.display.map(t => {
          if (t.space) return '<div class="mini-tile space"></div>';
          return `<div class="mini-tile ${t.revealed ? 'revealed' : 'blank'}">${t.revealed ? t.char : ''}</div>`;
        }).join('') + '</div>' : ''}
        ${state.phase === 'bonus_solve' ? '<div style="text-align:center;font-size:2rem;font-weight:900;color:#ef4444;">' + state.bonus.timeRemaining + '</div>' : ''}
      </div>`;
      break;

    case 'bonus_result':
    case 'final_score':
      html += `<div class="panel">
        <div class="status-msg" style="color:#fbbf24;font-size:1.3rem;font-weight:700;">Game Over!</div>
        <div class="player-score">Final: $${me.bank.toLocaleString()}</div>
      </div>`;
      break;

    default:
      html += `<div class="panel"><div class="status-msg">${state.phase}</div></div>`;
  }

  // Other players' scores
  html += '<div class="panel" style="font-size:0.85rem;">';
  html += '<div style="color:#666;margin-bottom:0.3rem;">Scores</div>';
  state.players.forEach(p => {
    const isMe = p.id === myPlayerId;
    html += `<div style="display:flex;justify-content:space-between;padding:2px 0;${isMe ? 'color:#4ade80;font-weight:700;' : 'color:#888;'}">
      <span>${p.name}${isMe ? ' (you)' : ''}</span>
      <span>$${p.roundEarnings.toLocaleString()} / Bank: $${p.bank.toLocaleString()}</span>
    </div>`;
  });
  html += '</div>';

  el.innerHTML = html;
}

function doJoin() {
  const input = document.getElementById('name-input');
  const name = input.value.trim();
  if (name) joinGame(name);
}

connect();
</script>
</body>
</html>
